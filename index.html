<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrida Gravitacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <div id="game-container">
        <!-- HUD -->
        <div id="hud" class="hidden">
            <div id="score-display">0m</div>
            <button id="btn-restart-hud">⏸ Reiniciar</button>
        </div>

        <!-- Canvas Game -->
        <canvas id="game-canvas"></canvas>

        <!-- Main Menu -->
        <div id="main-menu" class="overlay">
            <h1>Corrida Gravitacional</h1>
            <p>Toque ou clique para inverter a gravidade!</p>
            
            <div class="players-setup" style="display: flex; gap: 20px; margin-bottom: 20px; justify-content: center;">
                <div class="character-selection p1-setup" style="margin-bottom: 0;">
                    <h3 style="font-size: 16px;">Jogador 1 (W/S)</h3>
                    <div class="characters p1-chars">
                        <div class="char-option selected" data-char="chicken">
                            <div class="char-icon" style="font-size: 32px; margin-bottom: 0;">🐔</div>
                        </div>
                        <div class="char-option" data-char="capybara">
                            <div class="char-icon" style="font-size: 32px; margin-bottom: 0;">🐹</div>
                        </div>
                        <div class="char-option" data-char="cow">
                            <div class="char-icon" style="font-size: 32px; margin-bottom: 0;">🐮</div>
                        </div>
                    </div>
                </div>
                <div class="character-selection p2-setup" style="margin-bottom: 0;">
                    <h3 style="font-size: 16px;">Jogador 2 (Setas)</h3>
                    <div class="characters p2-chars">
                        <div class="char-option" data-char="chicken">
                            <div class="char-icon" style="font-size: 32px; margin-bottom: 0;">🐔</div>
                        </div>
                        <div class="char-option selected" data-char="capybara">
                            <div class="char-icon" style="font-size: 32px; margin-bottom: 0;">🐹</div>
                        </div>
                        <div class="char-option" data-char="cow">
                            <div class="char-icon" style="font-size: 32px; margin-bottom: 0;">🐮</div>
                        </div>
                    </div>
                </div>
            </div>

            <button id="btn-start" class="primary-btn">INICIAR JOGO</button>
            <div class="instructions">
                Objetivo: Sobreviver!<br>
                Desvie das serras, vãos e caixotes.
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over" class="overlay hidden">
            <h1>Game Over</h1>
            <h2 id="winner-display" style="color: #ffdd59; text-shadow: 2px 2px 0 #1e272e; margin-bottom: 20px;">Empate!</h2>
            <div class="score-board">
                <div class="score-box">
                    <span>Distância</span>
                    <h2 id="final-score">0m</h2>
                </div>
                <div class="score-box">
                    <span>Recorde</span>
                    <h2 id="high-score">0m</h2>
                </div>
            </div>
            <button id="btn-retry" class="primary-btn">TENTAR NOVAMENTE</button>
            <button id="btn-menu" class="secondary-btn">Voltar ao Menu</button>
        </div>
    </div>

    <script src="game.js?v=4"></script>
</body>
</html>
